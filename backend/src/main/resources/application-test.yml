spring:
  datasource:
    url: jdbc:tc:postgresql:16:///keepernotes_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
