spring:
  application:
    name: keeper-notes-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/keepernotes}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    rate-limit-requests: 10
    rate-limit-window-hours: 1
  storage:
    r2-account-id: ${R2_ACCOUNT_ID:}
    r2-access-key: ${R2_ACCESS_KEY:}
    r2-secret-key: ${R2_SECRET_KEY:}
    r2-bucket-name: ${R2_BUCKET_NAME:keepernotes-files}

springdoc:
  api-docs:
    path: /api/docs/json
  swagger-ui:
    path: /api/docs
  show-actuator: false

logging:
  level:
    com.keepernotes: INFO
    org.springframework.security: WARN
